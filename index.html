<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAE - UE Libertador Bolívar</title>
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    
    <!-- Fuentes y Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/principal.css">
    <link rel="stylesheet" href="css/componentes.css">
</head>
<body>

    <!-- FONDO ANIMADO -->
    <div class="fondo-animado">
        <div class="esfera esfera-1"></div>
        <div class="esfera esfera-2"></div>
        <div class="esfera esfera-3"></div>
    </div>

    <!-- LOADER -->
    <div id="pantalla-carga" class="glass-loader">
        <div class="loader-contenido">
            <div class="anillos-rotatorios"></div>
            <img src="assets/img/logo.png" class="logo-loader pulse-anim" alt="Logo">
        </div>
    </div>

    <!-- LOGIN -->
    <div id="vista-login" class="contenedor-login" style="display: none;">
        <div class="tarjeta-login-magica glass-panel animate__animated animate__zoomIn">
            <div class="contenedor-logo-magico mx-auto">
                <div class="anillo-energia"></div>
                <div class="anillo-energia inverso"></div>
                <div class="pulso-trasero"></div>
                <img src="assets/img/logo.png" width="90" class="logo-flotante-magico">
            </div>
            <div class="text-center mt-4 mb-5">
                <span class="subtitulo-brillante animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">Sistema de Gestión Escolar</span>
                <h1 class="titulo-colegio-shimmer fw-bolder mt-2 animate__animated animate__fadeInUp" style="animation-delay: 0.5s;">Unidad Educativa<br>Libertador Bolívar</h1>
            </div>
            <div class="login-formulario bg-white rounded-4 shadow-sm mx-auto animate__animated animate__fadeInUp" style="animation-delay: 0.7s;">
                <h4 class="fw-bold mb-4 text-center" style="color: var(--color-primario);">¡Bienvenido!</h4>
                <div id="paso-cedula">
                    <input type="number" id="inputCedula" class="input-moderno mb-3" placeholder="Ingresa tu Cédula">
                    <button onclick="Aplicacion.verificarUsuario()" class="btn-moderno btn-primario w-100 mb-3">Siguiente <i class="bi bi-arrow-right"></i></button>
                    <button onclick="Aplicacion.accesoInvitado()" class="btn btn-link text-muted w-100 text-decoration-none hover-efecto">Acceder como Invitado</button>
                </div>
                <div id="paso-clave" style="display:none;" class="animate__animated animate__fadeInRight">
                    <div class="usuario-badge mb-4 w-100 justify-content-center"><i class="bi bi-person-circle me-2"></i><span id="lbl-nombre-login"></span></div>
                    <div class="input-grupo-moderno mb-4">
                        <input type="password" id="inputClave" class="input-moderno sin-borde-derecho" placeholder="Contraseña">
                        <button class="btn-ojo" onclick="Aplicacion.alternarClave('inputClave')"><i class="bi bi-eye"></i></button>
                    </div>
                    <button onclick="Aplicacion.iniciarSesion()" class="btn-moderno btn-exito w-100 mb-2">Ingresar <i class="bi bi-box-arrow-in-right"></i></button>
                    <button onclick="location.reload()" class="btn btn-link text-muted w-100 text-decoration-none">Atrás</button>
                </div>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="vista-app" style="display: none;">
        <aside id="menu-lateral" class="glass-sidebar shadow-lg">
            <div class="sidebar-header d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center" onclick="Enrutador.navegar('Inicio')" style="cursor: pointer;">
                    <img src="assets/img/logo.png" width="40" class="me-2 logo-img">
                    <span class="fw-bold texto-gradiente sidebar-texto">SIGAE UE L.B.</span>
                </div>
                <button class="btn-colapsar d-none d-lg-block ms-auto" onclick="Aplicacion.alternarMenu()"><i class="bi bi-list"></i></button>
            </div>
            <div id="contenedor-enlaces" class="sidebar-menu pb-5"></div>
        </aside>
        <main id="contenido-principal">
            <header class="glass-header shadow-sm d-flex align-items-center px-4">
                <button class="btn-movil d-lg-none me-3" onclick="Aplicacion.alternarMenuMovil()"><i class="bi bi-list fs-3"></i></button>
                <h5 id="titulo-pagina" class="mb-0 fw-bold text-dark d-none d-md-block">Cargando...</h5>
                <div class="ms-auto d-flex align-items-center">
                    <div class="usuario-info me-3 text-end d-none d-md-block">
                        <div id="nombre-usuario-nav" class="fw-bold text-dark">Usuario</div>
                        <div id="rol-usuario-nav" class="small texto-gradiente fw-bold">Rol</div>
                    </div>
                    <button onclick="Aplicacion.cerrarSesion()" class="btn-circulo btn-peligro shadow-sm" title="Cerrar Sesión"><i class="bi bi-power"></i></button>
                </div>
            </header>
            <div id="area-dinamica" class="contenedor-dinamico p-4 p-md-5"></div>
        </main>
    </div>

    <!-- LIBRERÍAS EXTERNAS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- LÓGICA DEL SISTEMA -->
    <script src="js/nucleo/configuracion.js"></script>
    <script src="js/nucleo/enrutador.js"></script>
    <script src="js/nucleo/aplicacion.js"></script>
    
    <!-- MÓDULOS -->
    <script src="js/modulos/mod_inicio.js"></script>
    <script src="js/modulos/mod_escuela.js"></script>
    <script src="js/modulos/mod_transporte.js"></script>
    <script src="js/modulos/mod_docentes.js"></script> <!-- ESTA LÍNEA ERA LA CULPABLE -->
</body>
</html>
