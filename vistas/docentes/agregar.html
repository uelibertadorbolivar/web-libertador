<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-12">
        <div class="tarjeta-modulo">
            <div class="tarjeta-header bg-gradiente-principal text-white" style="border-radius: 20px;">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 50px; height: 50px;">
                        <i class="bi bi-person-check-fill fs-4"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-0">Designar Guiatura</h4>
                        <small class="opacity-75">Asignar docentes guía a cada grado/año</small>
                    </div>
                </div>
            </div>

            <div class="tarjeta-body p-4">
                <!-- FORMULARIO DE ASIGNACIÓN -->
                <div class="row g-3 align-items-end bg-light p-3 rounded-4 border mb-4 shadow-sm">
                    <div class="col-md-4">
                        <label class="small fw-bold text-muted ps-2 mb-1">1. Grado/Año sin Guía</label>
                        <select id="sel-grado-guia" class="input-moderno bg-white"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="small fw-bold text-muted ps-2 mb-1">2. Docente Guía Principal</label>
                        <select id="sel-docente1" class="input-moderno bg-white"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="small fw-bold text-muted ps-2 mb-1">3. Docente Auxiliar (Opcional)</label>
                        <select id="sel-docente2" class="input-moderno bg-white"></select>
                    </div>
                    <div class="col-md-2">
                        <button onclick="ModDocentes.guardarGuiatura()" class="btn-moderno btn-exito w-100">
                            <i class="bi bi-check-circle-fill me-1"></i> Guardar
                        </button>
                    </div>
                </div>

                <!-- LISTA DE GUIATURAS ACTUALES -->
                <h6 class="fw-bold text-primary mb-3 ps-2">Guiaturas Designadas</h6>
                <div class="table-responsive">
                    <table class="tabla-moderna">
                        <thead>
                            <tr>
                                <th>Grado / Año</th>
                                <th>Docente Principal</th>
                                <th>Docente Auxiliar</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-guiaturas">
                            <!-- Carga dinámica -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
