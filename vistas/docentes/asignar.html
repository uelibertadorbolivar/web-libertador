<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-12">
        <div class="tarjeta-modulo">
            <div class="tarjeta-header bg-gradiente-principal text-white" style="border-radius: 20px;">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 50px; height: 50px;">
                        <i class="bi bi-person-vcard-fill fs-4"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-0">Asignación de Cargos</h4>
                        <small class="opacity-75">Vincular personal a la estructura organizativa</small>
                    </div>
                </div>
            </div>

            <div class="tarjeta-body p-4">
                <!-- BARRA DE ASIGNACIÓN RÁPIDA -->
                <div class="row g-3 align-items-end bg-light p-3 rounded-4 border mb-4 shadow-sm">
                    <div class="col-md-5">
                        <label class="small fw-bold text-muted ps-2 mb-1">1. Seleccione Personal</label>
                        <select id="sel-personal" class="input-moderno bg-white">
                            <option value="">Cargando personal...</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="small fw-bold text-muted ps-2 mb-1">2. Seleccione Cargo</label>
                        <select id="sel-cargo" class="input-moderno bg-white">
                            <option value="">Cargando cargos...</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button onclick="ModDocentes.guardarAsignacion()" class="btn-moderno btn-exito w-100">
                            <i class="bi bi-link-45deg me-1"></i> Asignar
                        </button>
                    </div>
                </div>

                <!-- LISTA DE ASIGNACIONES -->
                <h6 class="fw-bold text-primary mb-3 ps-2">Asignaciones Actuales (Alimentan el Organigrama)</h6>
                <div class="table-responsive">
                    <table class="tabla-moderna">
                        <thead>
                            <tr>
                                <th>Funcionario</th>
                                <th>Cédula</th>
                                <th>Cargo Asignado</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-asignaciones">
                            <tr><td colspan="4" class="text-center text-muted">Cargando asignaciones...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
