<style>
    @keyframes flotar-suave { 0% { transform: translateY(0) translateX(0) scale(1); } 33% { transform: translateY(-15px) translateX(10px) scale(1.02); } 66% { transform: translateY(10px) translateX(-10px) scale(0.98); } 100% { transform: translateY(0) translateX(0) scale(1); } }
    .burbuja-3d { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, transparent 100%); box-shadow: inset -15px -15px 30px rgba(0, 0, 0, 0.15), inset 15px 15px 30px rgba(255, 255, 255, 0.3), 0 15px 35px rgba(0, 0, 0, 0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.15); pointer-events: none; }
    .burbuja-1 { width: 300px; height: 300px; top: -100px; right: -50px; animation: flotar-suave 8s infinite ease-in-out; }
    .burbuja-2 { width: 200px; height: 200px; bottom: -50px; right: 150px; animation: flotar-suave 12s infinite ease-in-out reverse; }
</style>

<div class="mb-4 animate__animated animate__fadeIn">
    <button class="btn btn-white rounded-pill fw-bold shadow-sm px-4 hover-efecto" style="color: #0066FF; border: 1px solid rgba(0, 102, 255, 0.3);" onclick="Enrutador.navegar('Seguridad y Accesos')">
        <i class="bi bi-arrow-left me-2"></i> Volver al menú de Seguridad y Accesos
    </button>
</div>

<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white shadow-sm" style="background: linear-gradient(135deg, #0066FF 0%, #003399 100%); border-radius: 24px; position: relative; overflow: hidden;">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-9 text-center text-md-start mb-3 mb-md-0">
                    <span class="badge bg-white text-primary mb-3 px-3 py-2 shadow-sm fw-bold" style="letter-spacing: 1px; font-size: 0.85rem;"><i class="bi bi-person-badge me-1"></i> SEGURIDAD Y ACCESOS</span>
                    <h1 class="fw-bolder mb-2 text-white" style="font-size: 2.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Mi Perfil</h1>
                    <p class="mb-0 fw-bold fs-5" style="color: rgba(255,255,255,0.9);">Actualiza tus datos de contacto y credenciales de acceso.</p>
                </div>
                <!-- LOGO AGREGADO -->
                <div class="col-md-3 text-center text-md-end d-none d-md-block">
                    <img src="assets/img/logo.png" alt="Logo Escuela" style="max-height: 130px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 text-center p-4" style="border-top: 5px solid #0066FF !important;">
            <div class="mb-4 mt-3">
                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center shadow-sm border border-primary" style="width: 120px; height: 120px;">
                    <i class="bi bi-person-fill text-primary" style="font-size: 5rem;"></i>
                </div>
            </div>
            <h4 class="fw-bold text-dark mb-1" id="perfil-nombre-display">Cargando...</h4>
            <p class="text-muted mb-3">C.I: <span id="perfil-cedula-display">...</span></p>
            <span class="badge bg-primary rounded-pill px-3 py-2 fs-6 shadow-sm mb-4" id="perfil-rol-display">...</span>
            <hr class="text-muted opacity-25">
            <div class="text-start mt-3">
                <p class="small text-muted mb-1 fw-bold"><i class="bi bi-envelope-fill text-primary me-2"></i>Correo Electrónico:</p>
                <p class="text-dark fw-bold" id="perfil-email-display">---</p>
                <p class="small text-muted mb-1 fw-bold mt-3"><i class="bi bi-telephone-fill text-primary me-2"></i>Teléfono:</p>
                <p class="text-dark fw-bold" id="perfil-telefono-display">---</p>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 h-100 p-4 p-md-5">
            <h5 class="fw-bold text-dark border-bottom pb-3 mb-4"><i class="bi bi-pencil-square text-primary me-2"></i>Actualizar Información</h5>
            
            <form id="form-perfil" onsubmit="event.preventDefault(); window.ModPerfil.guardarCambios();">
                <div class="row g-3 mb-4">
                    <div class="col-md-12">
                        <label class="form-label small fw-bold text-muted">Nombre Completo</label>
                        <input type="text" id="perfil-nombre" class="input-moderno" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Correo Electrónico</label>
                        <input type="email" id="perfil-email" class="input-moderno">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted">Teléfono de Contacto</label>
                        <input type="text" id="perfil-telefono" class="input-moderno">
                    </div>
                </div>

                <div class="bg-light p-4 rounded-4 border mb-4">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="check-clave" onchange="window.ModPerfil.toggleClave()" style="cursor: pointer;">
                        <label class="form-check-label fw-bold text-dark" for="check-clave" style="cursor: pointer;">Deseo cambiar mi contraseña</label>
                    </div>
                    <div class="row g-3" id="bloque-clave" style="display: none;">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Contraseña Actual</label>
                            <input type="password" id="perfil-clave-actual" class="input-moderno border-warning">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Nueva Contraseña</label>
                            <input type="password" id="perfil-clave-nueva" class="input-moderno border-primary">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Confirmar Nueva</label>
                            <input type="password" id="perfil-clave-confirmar" class="input-moderno border-primary">
                        </div>
                    </div>
                </div>

                <div class="bg-light p-4 rounded-4 border mb-4">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="check-preguntas" onchange="window.ModPerfil.togglePreguntas()" style="cursor: pointer;">
                        <label class="form-check-label fw-bold text-dark" for="check-preguntas" style="cursor: pointer;">Deseo actualizar mis preguntas de seguridad</label>
                    </div>
                    <div class="row g-3" id="bloque-preguntas" style="display: none;">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Pregunta de Seguridad 1</label>
                            <select id="perfil-preg1" class="input-moderno border-primary"></select>
                            <input type="text" id="perfil-resp1" class="input-moderno mt-2" placeholder="Respuesta 1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Pregunta de Seguridad 2</label>
                            <select id="perfil-preg2" class="input-moderno border-primary"></select>
                            <input type="text" id="perfil-resp2" class="input-moderno mt-2" placeholder="Respuesta 2">
                        </div>
                    </div>
                </div>

                <div class="text-end border-top pt-4">
                    <button type="submit" class="btn btn-primary fw-bold px-5 shadow-sm hover-efecto rounded-pill"><i class="bi bi-floppy-fill me-2"></i>Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
