<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>
            
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-8 text-center text-md-start mb-4 mb-md-0">
                    <span class="badge bg-white text-primary mb-2 shadow-sm" style="font-weight: 800; letter-spacing: 1px;"><i class="bi bi-shield-lock-fill me-1"></i> SEGURIDAD</span>
                    <h2 class="fw-bolder mb-2 text-white" style="font-size: 2.2rem;">Roles y Privilegios</h2>
                    <p class="mb-0 text-white-50 fw-bold fs-5">Controla los niveles de acceso y los módulos permitidos para cada perfil.</p>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <div class="fondo-logo-blanco">
                        <img src="assets/img/logo.png" alt="Logo" class="img-fluid logo-animado-banner" style="max-height: 100px;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mb-3">
    <div class="col-12 text-end">
        <button class="btn-moderno btn-primario shadow-sm" onclick="ModSeguridad.modalNuevoRol()"><i class="bi bi-plus-circle-fill me-2"></i> Crear Nuevo Rol</button>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-12 col-xl-4">
        <div class="tarjeta-modulo p-4 bg-white h-100 shadow-sm">
            <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-list-check text-info me-2"></i> Roles del Sistema</h5>
            <div class="list-group list-group-flush rounded-3 border" id="lista-roles-sistema"><button class="list-group-item p-3 text-muted">Cargando...</button></div>
        </div>
    </div>

    <div class="col-12 col-xl-8">
        <div class="tarjeta-modulo p-4 p-md-5 bg-white h-100 shadow-sm border-top border-5 border-primary">
            <div id="panel-vacio-roles" class="text-center py-5"><i class="bi bi-shield-check text-muted opacity-25" style="font-size: 5rem;"></i><h4 class="fw-bold text-dark mt-3">Selecciona un Rol</h4><p class="text-muted">Haz clic en un rol de la lista izquierda.</p></div>

            <div id="panel-edicion-roles" style="display: none;" class="animate__animated animate__fadeIn">
                <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                    <div>
                        <span class="badge bg-light text-primary border border-primary mb-2 px-3 py-2">Editando Privilegios</span>
                        <div class="d-flex align-items-center mt-1 flex-wrap gap-2">
                            <h4 class="fw-bolder text-dark mb-0 me-2" id="titulo-rol-editar">Nombre del Rol</h4>
                            <button class="btn btn-sm btn-outline-primary" id="btn-seleccionar-todo" onclick="ModSeguridad.seleccionarTodo(this)"><i class="bi bi-check-all"></i> Marcar Todo</button>
                            <button class="btn btn-sm btn-outline-danger" id="btn-eliminar-rol" onclick="ModSeguridad.eliminarRol()"><i class="bi bi-trash-fill"></i> Eliminar Rol</button>
                        </div>
                    </div>
                    <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-none d-md-block"><i class="bi bi-key-fill fs-3 text-primary"></i></div>
                </div>

                <div class="alert alert-light border small text-muted mb-4"><i class="bi bi-info-circle-fill text-primary me-1"></i> Activa los interruptores para conceder acceso a los módulos.</div>
                <div class="row g-4" id="matriz-permisos"></div>
                <div class="text-end mt-5 pt-3 border-top"><button class="btn btn-link text-muted text-decoration-none me-3" onclick="ModSeguridad.cancelarEdicionRol()">Cancelar</button><button class="btn-moderno btn-primario px-4 shadow-sm" onclick="ModSeguridad.guardarPrivilegiosRol()"><i class="bi bi-save2-fill me-2"></i> Guardar Privilegios</button></div>
            </div>
        </div>
    </div>
</div>
