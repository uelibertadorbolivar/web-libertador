<div class="row g-4 justify-content-center">
    <div class="col-12 col-xl-10 animate__animated animate__fadeInUp">
        
        <div class="tarjeta-modulo">
            <!-- CABECERA DEL MÓDULO -->
            <div class="tarjeta-header bg-gradiente-principal text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 50px; height: 50px;">
                        <i class="bi bi-building fs-4"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-0">Perfil Institucional</h4>
                        <small class="opacity-75">Configuración base e identidad de la escuela</small>
                    </div>
                </div>
            </div>

            <!-- CUERPO DEL FORMULARIO -->
            <div class="tarjeta-body p-4 p-md-5">
                <form id="form-perfil-escuela" onsubmit="event.preventDefault(); guardarPerfilEscuela();">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Nombre de la Institución</label>
                            <input type="text" id="esc-nombre" class="input-moderno" placeholder="Ej. UE Libertador Bolívar" required>
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold text-muted mb-2">Código DEA</label>
                            <input type="text" id="esc-dea" class="input-moderno" placeholder="Código">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold text-muted mb-2">RIF</label>
                            <input type="text" id="esc-rif" class="input-moderno" placeholder="J-0000000">
                        </div>
                        <div class="col-12">
                            <label class="small fw-bold text-muted mb-2">Dirección Completa</label>
                            <input type="text" id="esc-direccion" class="input-moderno" placeholder="Ubicación física">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Misión</label>
                            <textarea id="esc-mision" class="input-moderno" rows="4" style="border-radius: 20px;" placeholder="Misión de la escuela..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Visión</label>
                            <textarea id="esc-vision" class="input-moderno" rows="4" style="border-radius: 20px;" placeholder="Visión a futuro..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">Objetivo Institucional</label>
                            <textarea id="esc-objetivo" class="input-moderno" rows="4" style="border-radius: 20px;" placeholder="Objetivo principal..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-2">PEIC</label>
                            <textarea id="esc-peic" class="input-moderno" rows="4" style="border-radius: 20px;" placeholder="Proyecto Educativo..."></textarea>
                        </div>
                        
                        <div class="col-12 text-end mt-5 pt-3 border-top">
                            <button type="submit" class="btn-moderno btn-primario px-5">
                                <i class="bi bi-floppy-fill me-2"></i> Guardar Cambios
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
