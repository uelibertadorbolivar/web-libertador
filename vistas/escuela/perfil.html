<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white" style="background: linear-gradient(135deg, #4A148C 0%, #8E24AA 100%);">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>
            
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-8 text-center text-md-start mb-4 mb-md-0">
                    <span class="badge bg-white text-primary mb-2 shadow-sm" style="color: #6A1B9A !important; font-weight: 800; letter-spacing: 1px;"><i class="bi bi-bank me-1"></i> DIRECCIÓN Y SISTEMA</span>
                    <h2 class="fw-bolder mb-2 text-white" style="font-size: 2.2rem;">Perfil de la Escuela</h2>
                    <p class="mb-0 text-white-50 fw-bold fs-5">Configura la identidad oficial y filosofía de la institución.</p>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <div class="fondo-logo-blanco">
                        <img src="assets/img/logo.png" alt="Logo" class="img-fluid logo-animado-banner" style="max-height: 100px;">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row justify-content-center animate__animated animate__fadeInUp">
    <div class="col-12 col-xl-10">
        <div class="tarjeta-modulo p-4 p-md-5 bg-white border-top border-5 shadow-sm" style="border-color: #6A1B9A !important;">
            
            <div class="row g-4">
                <div class="col-md-12">
                    <h5 class="fw-bold text-dark mb-3"><i class="bi bi-card-heading me-2" style="color: #6A1B9A;"></i> Identidad Institucional</h5>
                </div>
                
                <div class="col-md-12">
                    <label class="small fw-bold text-muted mb-1">Nombre Oficial de la Institución <span class="text-danger">*</span></label>
                    <input type="text" id="escuela-nombre" class="input-moderno" placeholder="Ej: Unidad Educativa Libertador Bolívar">
                </div>
                
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Código DEA</label>
                    <input type="text" id="escuela-dea" class="input-moderno" placeholder="Ej: OD000000">
                </div>
                
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Registro de Información Fiscal (RIF)</label>
                    <input type="text" id="escuela-rif" class="input-moderno" placeholder="Ej: J-00000000-0">
                </div>
                
                <div class="col-md-12">
                    <label class="small fw-bold text-muted mb-1">Dirección Completa</label>
                    <textarea id="escuela-direccion" class="input-moderno" rows="2" placeholder="Ubicación detallada de la sede principal..."></textarea>
                </div>

                <div class="col-md-12 mt-5">
                    <h5 class="fw-bold text-dark mb-3"><i class="bi bi-compass me-2" style="color: #8E24AA;"></i> Filosofía de Gestión</h5>
                </div>
                
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Misión</label>
                    <textarea id="escuela-mision" class="input-moderno" rows="4" placeholder="Propósito fundamental de la institución..."></textarea>
                </div>
                
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Visión</label>
                    <textarea id="escuela-vision" class="input-moderno" rows="4" placeholder="Hacia dónde se proyecta la escuela en el futuro..."></textarea>
                </div>
                
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Objetivo General</label>
                    <textarea id="escuela-objetivo" class="input-moderno" rows="3" placeholder="Meta principal a alcanzar..."></textarea>
                </div>
                
                <div class="col-md-6">
                    <label class="small fw-bold text-muted mb-1">Proyecto Educativo Integral Comunitario (PEIC)</label>
                    <textarea id="escuela-peic" class="input-moderno" rows="3" placeholder="Nombre o resumen del PEIC actual..."></textarea>
                </div>
            </div>

            <div class="text-center mt-5 pt-4 border-top">
                <button onclick="ModEscuela.guardarPerfil()" class="btn-moderno btn-primario px-5 py-3 shadow fs-5" style="background-color: #6A1B9A; border-color: #6A1B9A;">
                    <i class="bi bi-save2-fill me-2"></i> Guardar Perfil Institucional
                </button>
            </div>
            
        </div>
    </div>
</div>
