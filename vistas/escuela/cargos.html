<div class="row g-4 justify-content-center animate__animated animate__fadeInUp">
    <div class="col-12">
        <div class="tarjeta-modulo">
            <div class="tarjeta-header bg-gradiente-principal text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 50px; height: 50px;">
                        <i class="bi bi-briefcase-fill fs-4"></i>
                    </div>
                    <div style="min-width: 0;">
                        <h4 class="fw-bold mb-0 text-truncate">Cargos</h4>
                        <small class="opacity-75 d-none d-sm-block">Roles laborales</small>
                    </div>
                </div>
                <button onclick="ModEscuela.modalCargo()" class="btn btn-light text-primary fw-bold rounded-pill px-3 px-md-4 shadow-sm hover-efecto flex-shrink-0">
                    <i class="bi bi-plus-lg"></i> <span class="d-none d-sm-inline ms-2">Nuevo Cargo</span>
                </button>
            </div>
            <div class="tarjeta-body p-0">
                <div class="table-responsive px-3 px-md-4 pb-4 mt-3">
                    <table class="tabla-moderna">
                        <thead>
                            <tr>
                                <th>Cargo</th>
                                <th>Tipo</th>
                                <th class="d-none d-md-table-cell">Descripción</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cargos">
                            <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
