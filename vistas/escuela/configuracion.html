<style>
    .tarjeta-btn { background: white; border-radius: 16px; border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
    .tarjeta-btn:hover { transform: translateY(-8px); border-bottom-color: #4f46e5; box-shadow: 0 15px 35px rgba(79, 70, 229, 0.15) !important; }
    .tarjeta-btn.bloqueado { opacity: 0.6; filter: grayscale(100%); cursor: not-allowed; border-bottom-color: #e2e8f0; pointer-events: none; }
    
    /* ✨ ESFERAS DE CRISTAL 3D ✨ */
    @keyframes flotar-suave { 0% { transform: translateY(0) translateX(0) scale(1); } 33% { transform: translateY(-15px) translateX(10px) scale(1.02); } 66% { transform: translateY(10px) translateX(-10px) scale(0.98); } 100% { transform: translateY(0) translateX(0) scale(1); } }
    .burbuja-3d { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, transparent 100%); box-shadow: inset -15px -15px 30px rgba(0, 0, 0, 0.15), inset 15px 15px 30px rgba(255, 255, 255, 0.3), 0 15px 35px rgba(0, 0, 0, 0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.15); pointer-events: none; }
    .burbuja-1 { width: 300px; height: 300px; top: -100px; right: -50px; animation: flotar-suave 8s infinite ease-in-out; }
    .burbuja-2 { width: 200px; height: 200px; bottom: -50px; right: 150px; animation: flotar-suave 12s infinite ease-in-out reverse; }
    .burbuja-3 { width: 150px; height: 150px; top: 50px; left: 15%; animation: flotar-suave 10s infinite ease-in-out 1s; }
</style>

<div class="row mb-5 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white shadow-sm" style="background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%); border-radius: 24px; position: relative; overflow: hidden;">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-9 text-center text-md-start mb-3 mb-md-0">
                    <span class="badge bg-white mb-3 px-3 py-2 shadow-sm fw-bold" style="color: #4f46e5; letter-spacing: 1px; font-size: 0.85rem;"><i class="bi bi-sliders me-1"></i> DIRECCIÓN Y SISTEMA</span>
                    <h1 class="fw-bolder mb-2 text-white" style="font-size: 2.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Configuración Global</h1>
                    <p class="mb-0 fw-bold fs-5" style="color: rgba(255,255,255,0.9);">Parámetros, fechas y seguridad del sistema.</p>
                </div>
                <div class="col-md-3 text-center text-md-end d-none d-md-block"><img src="assets/img/logo.png" alt="Logo Escuela" style="max-height: 130px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));"></div>
            </div>
        </div>
    </div>
</div>

<div id="config-dashboard" class="row g-4 animate__animated animate__fadeIn justify-content-center"></div>

<div class="row mb-3 d-none animate__animated" id="btn-volver-dashboard">
    <div class="col-12 text-center text-md-start">
        <button class="btn btn-white shadow-sm fw-bold border rounded-pill px-4 hover-efecto" style="color: #4f46e5;" onclick="window.ModConfiguracion.volverDashboard()">
            <i class="bi bi-arrow-left me-2"></i>Volver al Menú
        </button>
    </div>
</div>

<div id="vista-periodos" class="row g-4 animate__animated d-none">
    <div class="col-12 col-xl-4">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-primary" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4" id="titulo-form-periodo"><i class="bi bi-calendar-event text-primary me-2"></i>Añadir Período</h5>
            <div id="form-periodos-area">
                <input type="text" id="txt-periodo" class="input-moderno mb-3" placeholder="Ej: 2025 - 2026">
                <div class="row g-2 mb-4">
                    <div class="col-6"><label class="small text-muted fw-bold">Fecha Inicio</label><input type="date" id="fecha-inicio-periodo" class="input-moderno"></div>
                    <div class="col-6"><label class="small text-muted fw-bold">Fecha Fin</label><input type="date" id="fecha-fin-periodo" class="input-moderno"></div>
                </div>
                <button class="btn-moderno btn-primario w-100 shadow-sm" id="btn-guardar-periodo" onclick="window.ModConfiguracion.guardarConfiguracion('Periodo_Escolar', 'txt-periodo', 'fecha-inicio-periodo', 'fecha-fin-periodo')">Guardar Período</button>
                <button class="btn btn-light w-100 mt-2 border d-none" id="btn-cancelar-periodo" onclick="window.ModConfiguracion.cancelarEdicion()">Cancelar</button>
            </div>
        </div>
    </div>
    <div class="col-12 col-xl-8">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-info" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4"><i class="bi bi-list-ul text-info me-2"></i>Historial de Períodos</h5>
            <div class="table-responsive border rounded-4"><table class="table table-hover align-middle mb-0"><thead class="bg-light"><tr><th class="ps-3">Período</th><th>Fechas</th><th>Estado</th><th class="text-end pe-3">Acción</th></tr></thead><tbody id="tabla-periodos"></tbody></table></div>
        </div>
    </div>
</div>

<div id="vista-lapsos" class="row g-4 animate__animated d-none">
    <div class="col-12 col-xl-4">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-warning" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4" id="titulo-form-lapso"><i class="bi bi-clock-history text-warning me-2"></i>Añadir Fase/Lapso</h5>
            <div id="form-lapsos-area">
                <input type="text" id="txt-lapso" class="input-moderno mb-3" placeholder="Ej: 1er Momento / Lapso">
                <div class="row g-2 mb-4">
                    <div class="col-6"><label class="small text-muted fw-bold">Fecha Inicio</label><input type="date" id="fecha-inicio-lapso" class="input-moderno"></div>
                    <div class="col-6"><label class="small text-muted fw-bold">Fecha Fin</label><input type="date" id="fecha-fin-lapso" class="input-moderno"></div>
                </div>
                <button class="btn-moderno btn-advertencia text-dark w-100 shadow-sm" id="btn-guardar-lapso" onclick="window.ModConfiguracion.guardarConfiguracion('Fase_Escolar', 'txt-lapso', 'fecha-inicio-lapso', 'fecha-fin-lapso')">Guardar Fase</button>
                <button class="btn btn-light w-100 mt-2 border d-none" id="btn-cancelar-lapso" onclick="window.ModConfiguracion.cancelarEdicion()">Cancelar</button>
            </div>
        </div>
    </div>
    <div class="col-12 col-xl-8">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-info" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4"><i class="bi bi-list-task text-info me-2"></i>Fases Registradas</h5>
            <div class="table-responsive border rounded-4"><table class="table table-hover align-middle mb-0"><thead class="bg-light"><tr><th class="ps-3">Fase / Lapso</th><th>Fechas</th><th>Estado</th><th class="text-end pe-3">Acción</th></tr></thead><tbody id="tabla-lapsos"></tbody></table></div>
        </div>
    </div>
</div>

<div id="vista-niveles" class="row g-4 animate__animated d-none">
    <div class="col-12 col-xl-4">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-success" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4" id="titulo-form-nivel"><i class="bi bi-layers text-success me-2"></i>Añadir Nivel</h5>
            <div id="form-niveles-area">
                <input type="text" id="txt-nivel" class="input-moderno mb-4" placeholder="Ej: Educación Inicial">
                <button class="btn-moderno btn-exito w-100 shadow-sm" id="btn-guardar-nivel" onclick="window.ModConfiguracion.guardarConfiguracion('Nivel_Educativo', 'txt-nivel')">Guardar Nivel</button>
                <button class="btn btn-light w-100 mt-2 border d-none" id="btn-cancelar-nivel" onclick="window.ModConfiguracion.cancelarEdicion()">Cancelar</button>
            </div>
        </div>
    </div>
    <div class="col-12 col-xl-8">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-info" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4"><i class="bi bi-layer-forward text-info me-2"></i>Niveles de la Institución</h5>
            <div class="table-responsive border rounded-4"><table class="table table-hover align-middle mb-0"><thead class="bg-light"><tr><th class="ps-3">Nivel</th><th class="text-end pe-3">Acción</th></tr></thead><tbody id="tabla-niveles"></tbody></table></div>
        </div>
    </div>
</div>
