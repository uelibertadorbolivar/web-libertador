<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white" style="background: linear-gradient(135deg, #E64A19 0%, #F4511E 100%);">
            <div class="burbuja-3d burbuja-1"></div><div class="burbuja-3d burbuja-2"></div><div class="burbuja-3d burbuja-3"></div>
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-8 text-center text-md-start mb-4 mb-md-0">
                    <span class="badge bg-white text-danger mb-2 shadow-sm" style="font-weight: 800; letter-spacing: 1px;"><i class="bi bi-sliders me-1"></i> SISTEMA</span>
                    <h2 class="fw-bolder mb-2 text-white" style="font-size: 2.2rem;">Configuración Global</h2>
                    <p class="mb-0 text-white-50 fw-bold fs-5">Gestiona periodos, lapsos y niveles educativos institucionales.</p>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <div class="fondo-logo-blanco"><img src="assets/img/logo.png" alt="Logo" class="img-fluid logo-animado-banner" style="max-height: 100px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-12 col-xl-6">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5" style="border-color: #E64A19;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold text-dark mb-0"><i class="bi bi-calendar-check-fill me-2" style="color: #E64A19;"></i>Años Escolares</h5>
                <button class="btn btn-sm text-white shadow-sm" style="background-color: #E64A19;" onclick="ModConfiguracion.nuevoParametro('Periodo_Escolar', 'Nuevo Año Escolar', 'Ej: 2025 - 2026')"><i class="bi bi-plus-lg"></i> Añadir</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light"><tr><th class="text-muted fw-bold">Periodo</th><th class="text-muted fw-bold text-center">Estado</th><th class="text-end text-muted fw-bold">Acciones</th></tr></thead>
                    <tbody id="tabla-periodos"><tr><td colspan="3" class="text-center text-muted">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-12 col-xl-6">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm h-100 border-top border-5 border-warning">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold text-dark mb-0"><i class="bi bi-clock-history text-warning me-2"></i>Fases (Lapsos)</h5>
                <button class="btn btn-sm btn-warning text-white shadow-sm" onclick="ModConfiguracion.nuevoParametro('Fase_Escolar', 'Nuevo Lapso', 'Ej: 1er Lapso')"><i class="bi bi-plus-lg"></i> Añadir</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light"><tr><th class="text-muted fw-bold">Nombre del Lapso</th><th class="text-end text-muted fw-bold">Acciones</th></tr></thead>
                    <tbody id="tabla-lapsos"><tr><td colspan="2" class="text-center text-muted">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm border-top border-5 border-success">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold text-dark mb-0"><i class="bi bi-layers-fill text-success me-2"></i>Niveles Educativos Operativos</h5>
                <button class="btn btn-sm btn-success shadow-sm" onclick="ModConfiguracion.nuevoParametro('Nivel_Educativo', 'Nuevo Nivel', 'Ej: Educación Primaria')"><i class="bi bi-plus-lg"></i> Añadir Nivel</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle w-100">
                    <thead class="bg-light"><tr><th class="text-muted fw-bold w-75">Nivel Educativo</th><th class="text-end text-muted fw-bold w-25">Acciones</th></tr></thead>
                    <tbody id="tabla-niveles"><tr><td colspan="2" class="text-center text-muted">Cargando...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
