<div class="row g-4 animate__animated animate__fadeInUp">
    <!-- COLUMNA 1: FORMULARIO -->
    <div class="col-lg-5">
        <div class="tarjeta-modulo h-100">
            <div class="tarjeta-header bg-gradiente-principal text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 45px; height: 45px;">
                        <i class="bi bi-journal-text fs-5"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Asignaturas</h5>
                        <small class="opacity-75">Configuración académica</small>
                    </div>
                </div>
            </div>
            
            <div class="tarjeta-body p-4">
                <form id="form-asignatura" onsubmit="event.preventDefault(); ModEscuela.guardarAsignatura();">
                    <input type="hidden" id="asig-id">
                    
                    <div class="mb-3">
                        <label class="small fw-bold text-muted mb-1">Nivel Educativo</label>
                        <select id="asig-nivel" class="input-moderno bg-white" onchange="ModEscuela.filtrarAsignaturas()" required>
                            <option value="">Cargando niveles...</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="small fw-bold text-muted mb-1">Nombre de la Asignatura</label>
                        <input type="text" id="asig-nombre" class="input-moderno" placeholder="Ej. Matemáticas" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn-moderno btn-primario shadow-lg">
                            <i class="bi bi-plus-lg me-2"></i> Guardar Asignatura
                        </button>
                        <button type="button" onclick="ModEscuela.limpiarAsignatura()" class="btn btn-light border">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- COLUMNA 2: LISTADO -->
    <div class="col-lg-7">
        <div class="tarjeta-modulo h-100">
            <div class="tarjeta-header bg-white border-bottom pt-4 pb-3">
                <div>
                    <h5 class="fw-bold mb-0 text-dark">Lista de Materias</h5>
                    <small class="text-muted">Filtradas por el nivel seleccionado</small>
                </div>
            </div>
            
            <div class="tarjeta-body p-0">
                <div id="lista-asignaturas" class="p-3 d-flex flex-wrap gap-2" style="max-height: 500px; overflow-y: auto;">
                    <div class="text-center text-muted w-100 py-4">Seleccione un nivel para ver sus asignaturas.</div>
                </div>
            </div>
        </div>
    </div>
</div>
