<style>
    .tarjeta-btn { background: white; border-radius: 16px; border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; overflow: hidden; }
    .tarjeta-btn:hover { transform: translateY(-8px); border-bottom-color: #0dcaf0; box-shadow: 0 15px 35px rgba(13, 202, 240, 0.15) !important; }
    .tarjeta-btn.bloqueado { opacity: 0.6; filter: grayscale(100%); cursor: not-allowed; border-bottom-color: #e2e8f0; pointer-events: none; }
    
    /* ✨ ESFERAS DE CRISTAL 3D ✨ */
    @keyframes flotar-suave { 0% { transform: translateY(0) translateX(0) scale(1); } 33% { transform: translateY(-15px) translateX(10px) scale(1.02); } 66% { transform: translateY(10px) translateX(-10px) scale(0.98); } 100% { transform: translateY(0) translateX(0) scale(1); } }
    .burbuja-3d { position: absolute; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 50%, transparent 100%); box-shadow: inset -15px -15px 30px rgba(0, 0, 0, 0.15), inset 15px 15px 30px rgba(255, 255, 255, 0.3), 0 15px 35px rgba(0, 0, 0, 0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.15); pointer-events: none; }
    .burbuja-1 { width: 300px; height: 300px; top: -100px; right: -50px; animation: flotar-suave 8s infinite ease-in-out; }
    .burbuja-2 { width: 200px; height: 200px; bottom: -50px; right: 150px; animation: flotar-suave 12s infinite ease-in-out reverse; }
    .burbuja-3 { width: 150px; height: 150px; top: 50px; left: 15%; animation: flotar-suave 10s infinite ease-in-out 1s; }
</style>

<div class="row mb-5 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo p-4 p-md-5 text-white shadow-sm" style="background: linear-gradient(135deg, #0dcaf0 0%, #087990 100%); border-radius: 24px; position: relative; overflow: hidden;">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-9 text-center text-md-start mb-3 mb-md-0">
                    <span class="badge bg-white mb-3 px-3 py-2 shadow-sm fw-bold" style="color: #087990; letter-spacing: 1px; font-size: 0.85rem;"><i class="bi bi-door-open me-1"></i> DIRECCIÓN Y SISTEMA</span>
                    <h1 class="fw-bolder mb-2 text-white" style="font-size: 2.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">Espacios y Ambientes</h1>
                    <p class="mb-0 fw-bold fs-5" style="color: rgba(255,255,255,0.9);">Gestión de infraestructura y capacidad instalada.</p>
                </div>
                <div class="col-md-3 text-center text-md-end d-none d-md-block"><img src="assets/img/logo.png" alt="Logo Escuela" style="max-height: 130px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));"></div>
            </div>
        </div>
    </div>
</div>

<div id="espacios-dashboard" class="row g-4 animate__animated animate__fadeIn justify-content-center"></div>

<div class="row mb-3 d-none animate__animated" id="btn-volver-dashboard">
    <div class="col-12 text-center text-md-start">
        <button class="btn btn-white shadow-sm fw-bold border rounded-pill px-4 hover-efecto" style="color: #087990;" onclick="window.ModEspacios.volverDashboard()">
            <i class="bi bi-arrow-left me-2"></i>Volver al Menú
        </button>
    </div>
</div>

<div id="vista-directorio" class="row animate__animated d-none">
    <div class="col-12">
        <div class="tarjeta-modulo p-4 bg-white shadow-sm border-top border-5 border-info" style="border-radius: 20px;">
            <h5 class="fw-bold text-dark mb-4"><i class="bi bi-list-columns-reverse text-info me-2"></i>Directorio de Espacios</h5>
            <div class="table-responsive rounded-4 border border-bottom-0 rounded-bottom-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light"><tr><th class="ps-3 py-3" style="width: 15%;">Tipo</th><th class="py-3">Nombre / Identificador</th><th class="py-3 text-center" style="width: 20%;">Capacidad</th><th class="py-3 text-end pe-3" style="width: 15%;">Acción</th></tr></thead>
                    <tbody id="tabla-espacios"><tr><td colspan="4" class="text-center py-5 text-muted">Cargando...</td></tr></tbody>
                </table>
            </div>
            <div id="paginacion-espacios" class="d-flex justify-content-between align-items-center p-3 bg-light border border-top-0 rounded-bottom-4 d-none flex-wrap gap-3"></div>
        </div>
    </div>
</div>

<div id="vista-registro" class="row animate__animated d-none">
    <div class="col-12 col-md-8 mx-auto">
        <div class="tarjeta-modulo p-4 p-md-5 bg-white shadow-sm border-top border-5 border-primary" style="border-radius: 20px;">
            <h4 class="fw-bold text-dark mb-4 border-bottom pb-3"><i class="bi bi-plus-square-fill text-primary me-2"></i>Registrar / Editar Espacio</h4>
            <div id="form-espacios-area" class="row g-4">
                <div class="col-md-8"><label class="fw-bold text-muted small mb-2">Nombre o Identificador del Espacio</label><input type="text" id="esp-nombre" class="input-moderno" placeholder="Ej: Aula 1 / Laboratorio de Física"></div>
                <div class="col-md-4"><label class="fw-bold text-muted small mb-2">Capacidad (Pax)</label><input type="number" id="esp-capacidad" class="input-moderno fw-bold" placeholder="Ej: 30"></div>
                <div class="col-12"><label class="fw-bold text-muted small mb-2">Tipo de Ambiente</label><select id="esp-tipo" class="form-select input-moderno bg-light fw-bold text-dark"><option value="Aula Clásica">Aula Clásica</option><option value="Laboratorio">Laboratorio Especializado</option><option value="Cancha / Área Deportiva">Cancha / Área Deportiva</option><option value="Auditorio / Usos Múltiples">Auditorio / Usos Múltiples</option><option value="Oficina Administrativa">Oficina Administrativa</option><option value="Otro">Otro</option></select></div>
                <div class="col-12 pt-3 text-end"><button class="btn-moderno btn-primario px-5 shadow-sm fw-bold w-100" id="btn-guardar-espacio" onclick="window.ModEspacios.guardarEspacio()"><i class="bi bi-save-fill me-2"></i>Guardar Espacio</button></div>
            </div>
        </div>
    </div>
</div>
