<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-12">
        <div class="tarjeta-modulo">
            <div class="tarjeta-header bg-gradiente-principal text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 50px; height: 50px;">
                        <i class="bi bi-shuffle fs-4"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-0">Asignación de Recorridos</h4>
                        <small class="opacity-75">Configura el orden de paradas por ruta</small>
                    </div>
                </div>
            </div>
            
            <div class="tarjeta-body p-4">
                <div class="mb-4">
                    <label class="fw-bold text-muted small mb-2">Seleccione una Ruta para configurar:</label>
                    <select id="rec-ruta-select" class="input-moderno" onchange="ModTransporte.seleccionarRuta(this.value)" style="max-width: 400px;">
                        <option value="">Cargando rutas...</option>
                    </select>
                </div>

                <div class="row g-0 border rounded-4 overflow-hidden shadow-sm">
                    <!-- IZQUIERDA: DISPONIBLES -->
                    <div class="col-md-6 border-end bg-white p-4">
                        <h6 class="fw-bold text-primary mb-3"><i class="bi bi-collection me-2"></i>Paradas Disponibles</h6>
                        <div id="lista-disponibles" class="d-flex flex-column gap-2" style="height: 400px; overflow-y: auto; padding-right: 5px;">
                            <div class="text-center text-muted py-5 small">Seleccione una ruta arriba</div>
                        </div>
                    </div>

                    <!-- DERECHA: ASIGNADAS -->
                    <div class="col-md-6 bg-light p-4">
                        <h6 class="fw-bold text-success mb-3"><i class="bi bi-map me-2"></i>Orden del Recorrido</h6>
                        <div id="lista-asignadas" class="d-flex flex-column gap-2" style="height: 340px; overflow-y: auto; padding-right: 5px;">
                            <div class="text-center text-muted py-5 small">El recorrido aparecerá aquí</div>
                        </div>
                        <div class="text-end mt-3 pt-3 border-top">
                            <button onclick="ModTransporte.guardarRecorrido()" class="btn-moderno btn-exito w-100">
                                <i class="bi bi-floppy-fill me-2"></i> Guardar Cambios
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
