<div class="row g-4 justify-content-center animate__animated animate__fadeInUp">
    <div class="col-12 col-xl-10">
        <div class="tarjeta-modulo">
            <div class="tarjeta-header bg-gradiente-principal text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 50px; height: 50px;">
                        <i class="bi bi-map-fill fs-4"></i>
                    </div>
                    <div>
                        <h4 class="fw-bold mb-0">Rutogramas Digitales</h4>
                        <small class="opacity-75">Generador de mapas tipo metro (PDF)</small>
                    </div>
                </div>
            </div>

            <div class="tarjeta-body p-4 p-md-5">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="small fw-bold text-muted mb-2">Vigencia Desde</label>
                        <input type="date" id="ruto-desde" class="input-moderno">
                    </div>
                    <div class="col-md-6">
                        <label class="small fw-bold text-muted mb-2">Vigencia Hasta</label>
                        <input type="date" id="ruto-hasta" class="input-moderno">
                    </div>

                    <div class="col-12 mt-4">
                        <div class="d-flex align-items-center mb-3 border-bottom pb-2">
                            <h6 class="fw-bold text-dark mb-0 me-3">Seleccione las Rutas:</h6>
                            <div class="form-check form-switch">
                                <input class="form-check-input cursor-pointer" type="checkbox" id="chk-todas-rutas" onchange="ModTransporte.toggleTodasRutas(this.checked)">
                                <label class="form-check-label small" for="chk-todas-rutas">Todas</label>
                            </div>
                        </div>
                        <div id="grid-rutas-pdf" class="row g-3">
                            <div class="col-12 text-muted text-center">Cargando rutas...</div>
                        </div>
                    </div>

                    <div class="col-12 text-center mt-5">
                        <button onclick="ModTransporte.generarPDF()" class="btn-moderno btn-primario px-5 shadow-lg">
                            <i class="bi bi-file-earmark-pdf-fill me-2"></i> Descargar Rutogramas
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CONTENEDOR OCULTO PARA IMPRESIÓN (FUERA DE PANTALLA) -->
<div id="contenedor-impresion-pdf" style="position: absolute; top: -9999px; left: 0; width: 800px; background: white; padding: 40px;"></div>
