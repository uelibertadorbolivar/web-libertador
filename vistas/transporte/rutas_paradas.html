<div class="row g-4 animate__animated animate__fadeInUp">
    <!-- COLUMNA 1: RUTAS -->
    <div class="col-lg-7">
        <div class="tarjeta-modulo h-100">
            <div class="tarjeta-header bg-gradiente-principal text-white">
                <div class="d-flex align-items-center">
                    <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 45px; height: 45px;">
                        <i class="bi bi-bus-front-fill fs-5"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0">Rutas Escolares</h5>
                        <small class="opacity-75">Líneas de transporte activas</small>
                    </div>
                </div>
                <button onclick="ModTransporte.modalRuta()" class="btn btn-light text-primary fw-bold rounded-pill px-3 shadow-sm hover-efecto flex-shrink-0">
                    <i class="bi bi-plus-lg"></i> <span class="d-none d-sm-inline ms-1">Nueva</span>
                </button>
            </div>
            <div class="tarjeta-body p-0">
                <div class="table-responsive px-3 px-md-4 pb-4 mt-3">
                    <table class="tabla-moderna">
                        <thead>
                            <tr>
                                <th>Información de la Ruta</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-rutas">
                            <tr><td colspan="2" class="text-center text-muted">Cargando rutas...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- COLUMNA 2: PARADAS -->
    <div class="col-lg-5">
        <div class="tarjeta-modulo h-100">
            <div class="tarjeta-header bg-white border-bottom-0 pt-4">
                <div class="d-flex align-items-center">
                    <div class="bg-warning text-white rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width: 45px; height: 45px;">
                        <i class="bi bi-geo-alt-fill fs-5"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold mb-0 text-dark">Paradas</h5>
                        <small class="text-muted">Puntos de recolección</small>
                    </div>
                </div>
                <button onclick="ModTransporte.modalParada()" class="btn-circulo" style="background: rgba(255,193,7,0.1); color: #ffc107;">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
            <div class="tarjeta-body pt-2">
                <div id="tabla-paradas" class="d-flex flex-column gap-2" style="max-height: 500px; overflow-y: auto;">
                    <div class="text-center text-muted">Cargando...</div>
                </div>
            </div>
        </div>
    </div>
</div>
